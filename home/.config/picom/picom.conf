backend = "glx";
vsync = true;

# -------------------------
# Shadows
# -------------------------
shadow = true;
shadow-radius = 0;
shadow-opacity = 0.3;
shadow-offset-x = -5;
shadow-offset-y = -5;

# -------------------------
# Blur (optional, lightweight)
# -------------------------
blur-background = true;
blur-background-fixed = true;
blur: {
  method = "dual_kawase";
  deviation = 1.0;
  strength = 5;
  background-exclude = [ "class_g != 'dwm'" ];
  }

# -------------------------
# Opacity
# -------------------------
inactive-opacity = 0.9;
active-opacity = 1;
frame-opacity = 1;
corner-radius = 0;

# -------------------------
# Misc
# -------------------------
detect-rounded-corners = true;
detect-client-opacity = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-transient = true;
xrender-sync-fence = true;
use-damage = true;
unredir-if-possible = true;


opacity-rule = [
  "90:class_g = 'vesktop'",
  "90:class_g = 'TelegramDesktop'",
  "95:class_g = 'firefox'",
  "90:class_g = 'Thunar'"
];
