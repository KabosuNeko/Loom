# ==========================================
# BACKEND
# ==========================================
backend = "glx";
vsync = true;
xrender-sync-fence = true;
use-damage = true;
unredir-if-possible = true;

# ==========================================
# SHADOWS
# ==========================================
shadow = true;
shadow-radius = 1;
shadow-opacity = 0.6;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-color = "#11111b";

# ==========================================
# BLUR & FADING
# ==========================================
blur: {
  method = "dual_kawase";
  size = 10;
  strength = 3;
};
blur-background = true;
blur-background-fixed = true;
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 3;

# ==========================================
# MISC
# ==========================================
corner-radius = 0;
detect-rounded-corners = false;
detect-client-opacity = true;
detect-transient = true;
use-ewmh-active-win = true;
log-level = "warn";

# ==========================================
# RULES
# ==========================================
rules = (
    { match = "class_g = 'dwm'"; shadow = false; blur-background = false; },

    { match = "focused"; opacity = 1.0; },
    { match = "!focused"; opacity = 0.85; },

    { match = "class_g = 'firefox'"; opacity = 0.95; },
    { match = "class_g = 'Pcmanfm'"; opacity = 0.90; },
    { match = "class_g = 'vesktop'"; opacity = 0.90; },

    { match = "window_type = 'tooltip'"; fade = true; shadow = true; opacity = 0.5; focus = true; full-shadow = false; },
    { match = "window_type = 'popup_menu' || window_type = 'dropdown_menu'"; opacity = 0.7; },
    { match = "window_type = 'menu' || window_type = 'desktop'"; shadow = false; blur-background = false; }
);
